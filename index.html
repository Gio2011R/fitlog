<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>APHUG Study — All 7 Units</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0d0d0d;
      --surface: #161616;
      --surface2: #1e1e1e;
      --border: rgba(255,255,255,0.08);
      --border2: rgba(255,255,255,0.14);
      --text: #f0ede8;
      --muted: #888580;
      --accent: #d4f054;
      --accent-dim: rgba(212,240,84,0.12);
      --accent-text: #0d0d0d;
      --red: #ff5a5a;
      --red-dim: rgba(255,90,90,0.12);
      --green: #4dca8a;
      --green-dim: rgba(77,202,138,0.12);
      --radius: 10px;
      --radius-lg: 14px;
      --font-display: 'Bebas Neue', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'DM Mono', monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ─── HEADER ─── */
    header {
      border-bottom: 1px solid var(--border);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      background: rgba(13,13,13,0.9);
      backdrop-filter: blur(12px);
      z-index: 100;
    }
    .logo {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: var(--accent);
      line-height: 1;
    }
    .logo span { color: var(--text); }
    .header-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
    }

    /* ─── LAYOUT ─── */
    .container {
      max-width: 820px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ─── NAV TABS ─── */
    .nav {
      display: flex;
      gap: 6px;
      margin-bottom: 1.5rem;
      flex-wrap: wrap;
    }
    .nav-btn {
      padding: 7px 16px;
      border: 1px solid var(--border2);
      border-radius: 99px;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }
    .nav-btn:hover { color: var(--text); border-color: rgba(255,255,255,0.25); }
    .nav-btn.active {
      background: var(--accent);
      color: var(--accent-text);
      border-color: var(--accent);
      font-weight: 500;
    }

    /* ─── UNIT PILLS ─── */
    .unit-filter {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 1.75rem;
    }
    .unit-pill {
      padding: 4px 12px;
      border-radius: 99px;
      border: 1px solid var(--border);
      font-size: 12px;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      font-family: var(--font-body);
      transition: all 0.15s;
    }
    .unit-pill:hover { border-color: var(--border2); color: var(--text); }
    .unit-pill.active {
      background: var(--surface2);
      color: var(--text);
      border-color: var(--border2);
    }

    /* ─── SECTION ─── */
    .section { display: none; }
    .section.active { display: block; }

    /* ─── FLASHCARDS ─── */
    .fc-meta {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.75rem;
    }
    .progress-wrap {
      flex: 1;
      height: 3px;
      background: var(--surface2);
      border-radius: 99px;
      margin-right: 1rem;
    }
    .progress-fill {
      height: 3px;
      background: var(--accent);
      border-radius: 99px;
      transition: width 0.3s;
    }
    .fc-counter {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
    }
    .unit-tag {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      background: var(--accent-dim);
      padding: 2px 8px;
      border-radius: 99px;
      margin-left: 0.75rem;
    }
    .flashcard {
      background: var(--surface);
      border: 1px solid var(--border2);
      border-radius: var(--radius-lg);
      min-height: 200px;
      padding: 2.5rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      user-select: none;
      transition: border-color 0.2s, transform 0.15s;
      margin-bottom: 1rem;
    }
    .flashcard:hover { border-color: rgba(255,255,255,0.22); transform: translateY(-1px); }
    .fc-label {
      font-family: var(--font-mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }
    .fc-term {
      font-size: 22px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.4;
    }
    .fc-hint {
      margin-top: 1.25rem;
      font-size: 11px;
      color: var(--muted);
      font-family: var(--font-mono);
    }
    .card-actions {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 8px;
      margin-bottom: 0.75rem;
    }
    .card-actions button {
      padding: 10px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border2);
      background: transparent;
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .card-actions button:hover { color: var(--text); border-color: rgba(255,255,255,0.22); }
    .btn-wrong { color: var(--red) !important; border-color: rgba(255,90,90,0.3) !important; }
    .btn-wrong:hover { background: var(--red-dim) !important; }
    .btn-right { color: var(--green) !important; border-color: rgba(77,202,138,0.3) !important; }
    .btn-right:hover { background: var(--green-dim) !important; }
    .btn-flip { background: var(--surface2) !important; color: var(--text) !important; }
    .fc-session-stats {
      text-align: center;
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--muted);
    }

    /* ─── QUIZ ─── */
    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.5rem;
    }
    .quiz-score-display {
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--muted);
    }
    .quiz-unit-tag { font-size: 11px; }
    .quiz-q {
      font-size: 17px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.55;
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
    }
    .quiz-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.25rem; }
    .quiz-opt {
      padding: 13px 16px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      text-align: left;
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      color: var(--muted);
      transition: border-color 0.15s, background 0.15s, color 0.15s;
      line-height: 1.5;
    }
    .quiz-opt:hover:not(:disabled) { border-color: var(--border2); color: var(--text); background: var(--surface2); }
    .quiz-opt.correct { border-color: rgba(77,202,138,0.5) !important; background: var(--green-dim) !important; color: var(--green) !important; }
    .quiz-opt.wrong { border-color: rgba(255,90,90,0.5) !important; background: var(--red-dim) !important; color: var(--red) !important; }
    .quiz-feedback {
      font-size: 13px;
      padding: 10px 14px;
      border-radius: var(--radius);
      margin-bottom: 1rem;
      font-family: var(--font-mono);
    }
    .quiz-feedback.correct { background: var(--green-dim); color: var(--green); }
    .quiz-feedback.wrong { background: var(--red-dim); color: var(--red); }
    .next-btn {
      padding: 11px 24px;
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      background: var(--accent);
      color: var(--accent-text);
      font-family: var(--font-body);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .next-btn:hover { opacity: 0.88; }

    /* ─── FRQ ─── */
    .frq-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 1rem;
    }
    .frq-prompt {
      font-size: 15px;
      color: var(--text);
      line-height: 1.8;
      margin-bottom: 1.5rem;
      padding: 1.5rem;
      background: var(--surface);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border);
      border-left: 3px solid var(--accent);
      white-space: pre-wrap;
    }
    .frq-textarea {
      width: 100%;
      min-height: 130px;
      padding: 14px;
      font-family: var(--font-body);
      font-size: 14px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text);
      resize: vertical;
      margin-bottom: 1rem;
      transition: border-color 0.15s;
    }
    .frq-textarea:focus { outline: none; border-color: var(--border2); }
    .frq-textarea::placeholder { color: var(--muted); }
    details.rubric { margin-bottom: 1rem; }
    details.rubric summary {
      cursor: pointer;
      font-size: 13px;
      color: var(--muted);
      font-family: var(--font-mono);
      padding: 8px 0;
      user-select: none;
      list-style: none;
    }
    details.rubric summary::before { content: '▶  '; font-size: 10px; }
    details.rubric[open] summary::before { content: '▼  '; }
    .rubric-body {
      padding: 1.25rem;
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      margin-top: 8px;
      font-size: 14px;
      line-height: 1.75;
      color: var(--text);
    }
    .rubric-body p { margin-bottom: 0.6rem; }
    .rubric-body strong { color: var(--accent); font-weight: 500; }
    .frq-actions { display: flex; gap: 8px; }
    .frq-skip {
      padding: 11px 20px;
      border: 1px solid var(--border2);
      border-radius: var(--radius);
      background: transparent;
      font-family: var(--font-body);
      font-size: 14px;
      cursor: pointer;
      color: var(--muted);
      transition: all 0.15s;
    }
    .frq-skip:hover { color: var(--text); border-color: rgba(255,255,255,0.22); }

    /* ─── SUMMARIES ─── */
    .summary-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 10px;
      margin-bottom: 1rem;
    }
    .summary-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.25rem;
      cursor: pointer;
      transition: border-color 0.15s, transform 0.15s;
    }
    .summary-card:hover { border-color: var(--border2); transform: translateY(-2px); }
    .s-unit-num {
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.08em;
      margin-bottom: 6px;
    }
    .s-unit-name {
      font-size: 15px;
      font-weight: 500;
      color: var(--text);
      line-height: 1.3;
    }
    .back-btn {
      padding: 7px 16px;
      border: 1px solid var(--border2);
      border-radius: 99px;
      background: transparent;
      font-family: var(--font-body);
      font-size: 13px;
      cursor: pointer;
      color: var(--muted);
      margin-bottom: 1.25rem;
      transition: all 0.15s;
    }
    .back-btn:hover { color: var(--text); }
    .summary-detail-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 2rem;
    }
    .summary-detail-card h2 {
      font-family: var(--font-display);
      font-size: 2rem;
      letter-spacing: 0.04em;
      color: var(--accent);
      margin-bottom: 1.5rem;
    }
    .summary-detail-card ul { padding-left: 1.25rem; }
    .summary-detail-card li {
      font-size: 14px;
      line-height: 1.85;
      color: var(--text);
      margin-bottom: 0.35rem;
    }
    .summary-detail-card li strong { color: var(--accent); font-weight: 500; }

    /* ─── FOOTER ─── */
    footer {
      border-top: 1px solid var(--border);
      padding: 1.5rem 2rem;
      text-align: center;
      font-family: var(--font-mono);
      font-size: 11px;
      color: var(--muted);
      letter-spacing: 0.06em;
    }

    @media (max-width: 560px) {
      header { padding: 1rem; }
      .container { padding: 1.5rem 1rem 3rem; }
      .card-actions { grid-template-columns: 1fr 1fr; }
      .card-actions .btn-flip { grid-column: 1 / -1; order: -1; }
      .summary-grid { grid-template-columns: 1fr 1fr; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">AP<span>HUG</span></div>
  <div class="header-tag">All 7 Units · Exam Prep</div>
</header>

<div class="container">

  <!-- NAV -->
  <div class="nav">
    <button class="nav-btn active" onclick="switchTab('flashcards', this)">Flashcards</button>
    <button class="nav-btn" onclick="switchTab('quiz', this)">Multiple Choice</button>
    <button class="nav-btn" onclick="switchTab('frq', this)">FRQs</button>
    <button class="nav-btn" onclick="switchTab('summaries', this)">Unit Summaries</button>
  </div>

  <!-- UNIT FILTER -->
  <div class="unit-filter" id="unit-filter">
    <button class="unit-pill active" onclick="setUnit('all', this)">All units</button>
    <button class="unit-pill" onclick="setUnit(1, this)">Unit 1</button>
    <button class="unit-pill" onclick="setUnit(2, this)">Unit 2</button>
    <button class="unit-pill" onclick="setUnit(3, this)">Unit 3</button>
    <button class="unit-pill" onclick="setUnit(4, this)">Unit 4</button>
    <button class="unit-pill" onclick="setUnit(5, this)">Unit 5</button>
    <button class="unit-pill" onclick="setUnit(6, this)">Unit 6</button>
    <button class="unit-pill" onclick="setUnit(7, this)">Unit 7</button>
  </div>

  <!-- ══════════════════ FLASHCARDS ══════════════════ -->
  <div class="section active" id="sec-flashcards">
    <div class="fc-meta">
      <div class="progress-wrap"><div class="progress-fill" id="fc-bar" style="width:0%"></div></div>
      <span class="fc-counter" id="fc-counter">— / —</span>
      <span class="unit-tag" id="fc-unit-tag"></span>
    </div>
    <div class="flashcard" id="flashcard" onclick="flipCard()">
      <div class="fc-label" id="fc-label">Term</div>
      <div class="fc-term" id="fc-term">Loading…</div>
      <div class="fc-hint" id="fc-hint">tap to flip</div>
    </div>
    <div class="card-actions">
      <button class="btn-wrong" onclick="markCard(false)">✗ Still learning</button>
      <button class="btn-flip" onclick="flipCard()">↺ Flip</button>
      <button class="btn-right" onclick="markCard(true)">✓ Got it</button>
    </div>
    <div class="fc-session-stats" id="fc-stats"></div>
  </div>

  <!-- ══════════════════ QUIZ ══════════════════ -->
  <div class="section" id="sec-quiz">
    <div class="quiz-header">
      <div class="quiz-score-display" id="quiz-score">—</div>
      <span class="unit-tag quiz-unit-tag" id="quiz-unit-tag"></span>
    </div>
    <div class="quiz-q" id="quiz-q"></div>
    <div class="quiz-opts" id="quiz-opts"></div>
    <div id="quiz-feedback"></div>
    <button class="next-btn" id="quiz-next" onclick="nextQuiz()" style="display:none">Next →</button>
  </div>

  <!-- ══════════════════ FRQ ══════════════════ -->
  <div class="section" id="sec-frq">
    <div class="frq-num" id="frq-num"></div>
    <div class="frq-prompt" id="frq-prompt"></div>
    <textarea class="frq-textarea" id="frq-answer" placeholder="Write your response here…"></textarea>
    <details class="rubric">
      <summary>Show scoring guide &amp; model answer</summary>
      <div class="rubric-body" id="frq-rubric"></div>
    </details>
    <div class="frq-actions" style="margin-top:1rem">
      <button class="next-btn" onclick="nextFRQ()">Next prompt →</button>
      <button class="frq-skip" onclick="skipFRQ()">Skip</button>
    </div>
  </div>

  <!-- ══════════════════ SUMMARIES ══════════════════ -->
  <div class="section" id="sec-summaries">
    <div id="summary-list">
      <div class="summary-grid" id="summary-grid"></div>
    </div>
    <div id="summary-detail" style="display:none">
      <button class="back-btn" onclick="showSummaryList()">← All units</button>
      <div class="summary-detail-card" id="summary-detail-card"></div>
    </div>
  </div>

</div><!-- /container -->

<footer>APHUG STUDY · 100+ TERMS · 7 UNITS · 6 FRQs</footer>

<script>
// ══════════════ DATA ══════════════
const ALL_CARDS = [
  {u:1,term:"Absolute location",def:"An exact position on Earth using coordinates (latitude/longitude) or a specific address."},
  {u:1,term:"Relative location",def:"Position described in relation to other places (e.g., 'north of the river')."},
  {u:1,term:"Site vs. situation",def:"Site = physical characteristics of a place; Situation = location relative to surrounding features."},
  {u:1,term:"Formal region",def:"An area defined by a common characteristic (e.g., the Corn Belt, a country)."},
  {u:1,term:"Functional region",def:"Area organized around a focal point/node (e.g., a city's metropolitan area)."},
  {u:1,term:"Perceptual region",def:"Region defined by people's feelings or perceptions (e.g., 'the South,' 'the Middle East')."},
  {u:1,term:"Scale of analysis",def:"The spatial extent used to analyze geographic data — local, regional, national, global."},
  {u:1,term:"Spatial diffusion",def:"The spread of phenomena (ideas, diseases, innovations) across space over time."},
  {u:1,term:"Relocation diffusion",def:"Spread through physical movement of people carrying an idea/trait to a new place."},
  {u:1,term:"Expansion diffusion",def:"Spread from a central node outward while the origin retains the trait; includes contagious, hierarchical, and stimulus."},
  {u:1,term:"Contagious diffusion",def:"Rapid, widespread diffusion through direct contact (e.g., viral spread of an idea)."},
  {u:1,term:"Hierarchical diffusion",def:"Spread from larger/more powerful places to smaller ones (e.g., fashion trends from NYC to rural towns)."},
  {u:1,term:"Stimulus diffusion",def:"A modified idea spreads when the original is rejected (e.g., McDonald's adapting menus abroad)."},
  {u:1,term:"Distance decay",def:"Interaction between places decreases as distance increases."},
  {u:1,term:"Time-space compression",def:"Technology reduces the effective distance between places, making the world feel smaller."},
  {u:1,term:"GIS",def:"Geographic Information Systems — software that layers spatial data to analyze patterns."},
  {u:1,term:"Mental map",def:"An individual's perception of space and place that reflects personal knowledge and experiences."},
  {u:1,term:"Tobler's First Law",def:"'Everything is related to everything else, but near things are more related than distant things.'"},
  {u:2,term:"Crude birth rate (CBR)",def:"Number of live births per 1,000 people per year."},
  {u:2,term:"Crude death rate (CDR)",def:"Number of deaths per 1,000 people per year."},
  {u:2,term:"Rate of natural increase (RNI)",def:"CBR minus CDR — the percentage by which a population grows per year, excluding migration."},
  {u:2,term:"Total fertility rate (TFR)",def:"Average number of children a woman would have in her lifetime; replacement level ≈ 2.1."},
  {u:2,term:"Demographic transition model (DTM)",def:"5-stage model showing the transition from high birth/death rates to low birth/death rates as countries develop."},
  {u:2,term:"DTM Stage 1",def:"High CBR, high CDR, low population growth. Pre-industrial societies."},
  {u:2,term:"DTM Stage 2",def:"High CBR, falling CDR (better medicine/food), rapid population growth. Many LDCs."},
  {u:2,term:"DTM Stage 3",def:"Falling CBR, low CDR, slowing growth. Industrializing nations."},
  {u:2,term:"DTM Stage 4",def:"Low CBR, low CDR, stable/slow growth. MDCs like the US."},
  {u:2,term:"DTM Stage 5",def:"CBR below CDR, population decline. Japan, Germany, parts of Europe."},
  {u:2,term:"Epidemiological transition model",def:"Explains shifts in primary causes of death: infectious disease → chronic disease as countries develop."},
  {u:2,term:"Population pyramid",def:"Bar graph showing age/sex distribution of a population — shape reveals growth stage."},
  {u:2,term:"Dependency ratio",def:"Number of dependents (under 15 + over 64) per 100 working-age adults."},
  {u:2,term:"Voluntary migration",def:"Movement driven by personal choice, usually pull factors (better jobs, safety)."},
  {u:2,term:"Forced migration",def:"Displacement caused by violence, disaster, or persecution — no genuine choice."},
  {u:2,term:"Push factors",def:"Negative conditions that drive people to leave a place (poverty, conflict, drought)."},
  {u:2,term:"Pull factors",def:"Positive conditions that attract migrants to a destination (jobs, political freedom, family)."},
  {u:2,term:"Refugee",def:"Person who flees to another country due to well-founded fear of persecution (UN definition)."},
  {u:2,term:"Internally displaced person (IDP)",def:"Person forced to flee within their own country's borders."},
  {u:2,term:"Chain migration",def:"Migration driven by existing social ties — people follow family/friends to a destination."},
  {u:2,term:"Guest worker",def:"Migrant given temporary work authorization, often in sectors with labor shortages."},
  {u:2,term:"Ravenstein's laws of migration",def:"Most migrants move short distances; migration happens in steps; each flow produces a counter-flow."},
  {u:2,term:"Intervening opportunity",def:"A closer alternative that reduces the likelihood of migrating to a more distant destination."},
  {u:2,term:"Transnationalism",def:"Maintaining cultural/economic ties to the country of origin while living abroad."},
  {u:2,term:"Remittances",def:"Money sent by migrants back to families in their home country — major economic flow for many LDCs."},
  {u:2,term:"Overpopulation",def:"When a region's population exceeds the carrying capacity of its resources."},
  {u:2,term:"Malthusian theory",def:"Malthus argued population grows geometrically while food grows arithmetically — predicting crisis."},
  {u:3,term:"Culture",def:"Shared beliefs, values, practices, and artifacts of a group of people."},
  {u:3,term:"Cultural landscape",def:"The visible imprint of human activity on the environment (buildings, roads, farms)."},
  {u:3,term:"Sequent occupance",def:"Successive groups leave their cultural imprint on a place, layering over previous ones."},
  {u:3,term:"Acculturation",def:"A minority culture adopts traits of a dominant culture while retaining its own identity."},
  {u:3,term:"Assimilation",def:"A minority culture is fully absorbed into the dominant culture, losing its distinct identity."},
  {u:3,term:"Syncretism",def:"Blending of two or more cultural traits to form something new (e.g., Creole language, Voodoo)."},
  {u:3,term:"Multiculturalism",def:"Policy/condition where multiple cultures coexist and are valued within a society."},
  {u:3,term:"Cultural hearth",def:"The origin point of a cultural trait or civilization (e.g., Mesopotamia, Huang He valley)."},
  {u:3,term:"Universalizing religion",def:"A religion that seeks global converts (Christianity, Islam, Buddhism)."},
  {u:3,term:"Ethnic religion",def:"A religion tied to a specific cultural/ethnic group, not seeking converts (Hinduism, Judaism)."},
  {u:3,term:"Language family",def:"Group of languages sharing a common ancestral language (Indo-European is the largest)."},
  {u:3,term:"Lingua franca",def:"A common language used between people who have different native tongues (e.g., English, Swahili)."},
  {u:3,term:"Creole language",def:"A pidgin that becomes a native language for a community — fully developed grammar."},
  {u:3,term:"Dialect",def:"A regional variation of a language with differences in vocabulary, pronunciation, and grammar."},
  {u:3,term:"Isogloss",def:"A boundary line on a map separating regions where different linguistic usages occur."},
  {u:3,term:"Centripetal force",def:"A force that unifies a state or cultural group (common language, religion, national identity)."},
  {u:3,term:"Centrifugal force",def:"A force that divides or destabilizes a state (ethnic conflict, religious differences, separatism)."},
  {u:3,term:"Globalization",def:"Increasing interconnection of world cultures, economies, and politics; often spreads Western/American culture."},
  {u:3,term:"Cultural imperialism",def:"The imposition of one culture's values, norms, and practices over another (often by powerful nations)."},
  {u:4,term:"State",def:"A politically organized territory with a permanent population, defined borders, a government, and sovereignty."},
  {u:4,term:"Nation",def:"A group of people sharing a common identity (language, ethnicity, history) — may not have its own state."},
  {u:4,term:"Nation-state",def:"A state whose borders align closely with the territory of a single nation (rare; e.g., Iceland, Japan)."},
  {u:4,term:"Sovereignty",def:"The authority of a state to govern itself without external interference."},
  {u:4,term:"Colonialism",def:"Control of one territory by a foreign power, exploiting its resources and people."},
  {u:4,term:"Imperialism",def:"The extension of power and influence over other nations, often through economic or political control."},
  {u:4,term:"Devolution",def:"The transfer of political power from a central government to regional/local governments (e.g., Scotland in UK)."},
  {u:4,term:"Supranationalism",def:"When nations give up sovereignty to join a larger organization (e.g., EU, UN, NATO)."},
  {u:4,term:"Boundary types",def:"Antecedent (pre-settlement), subsequent (post-settlement), superimposed (drawn by outsiders), relic (no longer enforced)."},
  {u:4,term:"Gerrymandering",def:"Manipulating electoral district boundaries to favor a particular party or group."},
  {u:4,term:"Heartland theory (Mackinder)",def:"Control of the Eurasian 'heartland' = control of the world; emphasized land power."},
  {u:4,term:"Shatterbelt",def:"A region fragmented by competing external powers and internal ethnic divisions (e.g., Middle East, SE Asia)."},
  {u:4,term:"Exclave/enclave",def:"Exclave = part of a country separated from the main territory; enclave = a territory surrounded by another state."},

  {u:4,term:"Electoral geography",def:"The study of how geographic factors influence voting patterns and representation."},
  {u:5,term:"Subsistence agriculture",def:"Farming primarily to feed the farmer's own family, little or no surplus for sale."},
  {u:5,term:"Commercial agriculture",def:"Farming for profit — large-scale, mechanized, oriented toward market sale."},
  {u:5,term:"Green Revolution",def:"Mid-20th century introduction of high-yield crop varieties, fertilizers, and irrigation — boosted food production but created dependencies."},
  {u:5,term:"Von Thünen model",def:"Model showing concentric rings of land use around a city based on transportation costs and land value."},
  {u:5,term:"Agricultural hearths",def:"Areas where agriculture first developed independently: Fertile Crescent, Huang He, Mesoamerica, sub-Saharan Africa."},

  {u:5,term:"Monoculture",def:"Growing a single crop over a large area — efficient but vulnerable to pests and disease."},
  {u:5,term:"Agribusiness",def:"Large-scale, corporate farming integrating production, processing, distribution, and retail."},
  {u:5,term:"Genetically modified organisms (GMOs)",def:"Crops with DNA altered to improve yield, pest resistance, or nutritional content."},
  {u:5,term:"Food desert",def:"Area with limited access to affordable, nutritious food — often in low-income urban or rural areas."},
  {u:5,term:"Plantation agriculture",def:"Large-scale commercial farming of a single export crop, historically reliant on forced labor."},
  {u:5,term:"Slash-and-burn (shifting cultivation)",def:"Clearing land by burning, farming briefly, then moving on — traditional, low-input method."},
  {u:5,term:"Mediterranean agriculture",def:"Specialized farming of drought-resistant crops (grapes, olives, citrus) in dry-summer climates."},
  {u:5,term:"Bid-rent theory",def:"Land value decreases with distance from the city center; different users outbid each other at different distances."},
  {u:6,term:"Urbanization",def:"The process by which an increasing share of a population lives in urban areas."},
  {u:6,term:"Primate city",def:"A city that is disproportionately large compared to the next largest cities in the country (e.g., Bangkok, Paris)."},
  {u:6,term:"Rank-size rule",def:"The nth largest city is 1/n the size of the largest city — describes an even urban hierarchy."},
  {u:6,term:"Central place theory (Christaller)",def:"Explains how cities are distributed across space based on threshold and range of goods/services."},
  {u:6,term:"Threshold",def:"Minimum population needed to support a good or service."},
  {u:6,term:"Range",def:"Maximum distance people will travel to obtain a good or service."},
  {u:6,term:"Concentric zone model (Burgess)",def:"City grows in rings from CBD outward: CBD → transition zone → working class → middle class → commuter zone."},
  {u:6,term:"Sector model (Hoyt)",def:"City grows in wedges/sectors along transportation routes — industry and wealth spread outward in sectors."},
  {u:6,term:"Multiple nuclei model (Harris & Ullman)",def:"City has multiple centers (nuclei) rather than a single CBD; each specialized for a function."},
  {u:6,term:"Peripheral model (Galactic city)",def:"Edge cities cluster around a central city connected by beltways — characteristic of US sprawl."},
  {u:6,term:"Disamenity zone",def:"Areas in Latin American cities with poorest residents living in informal housing (favelas, barrios)."},
  {u:6,term:"Squatter settlement / informal settlement",def:"Unplanned housing built on land without legal ownership; common in rapidly urbanizing LDCs."},
  {u:6,term:"Gentrification",def:"Higher-income residents move into lower-income urban areas, raising property values and displacing original residents."},
  {u:6,term:"Suburbanization",def:"Movement of people and businesses from central cities to surrounding suburbs."},
  {u:6,term:"Edge city",def:"A large node of office and retail activity outside the traditional CBD, developed along highway corridors."},
  {u:6,term:"Smart growth",def:"Urban planning that encourages dense, walkable, transit-oriented development to limit sprawl."},
  {u:6,term:"Redlining",def:"Historical practice of denying services/loans to residents of minority neighborhoods — entrenched segregation."},
  {u:6,term:"Blockbusting",def:"Real estate practice of convincing white homeowners to sell cheaply by stoking fear of minority buyers moving in."},
  {u:7,term:"Gross domestic product (GDP)",def:"Total value of goods and services produced within a country in a year."},
  {u:7,term:"GDP per capita",def:"GDP divided by population — a measure of average economic output per person."},
  {u:7,term:"Human Development Index (HDI)",def:"Composite measure of development: life expectancy + education + GNI per capita."},
  {u:7,term:"Core-periphery model (Wallerstein)",def:"Core countries dominate and exploit peripheral countries; semi-periphery serves as a buffer."},

  {u:7,term:"Comparative advantage",def:"A country should specialize in goods it produces most efficiently relative to others."},
  {u:7,term:"Special economic zone (SEZ)",def:"An area with different economic regulations to attract foreign investment (e.g., China's coastal SEZs)."},
  {u:7,term:"Export processing zone (EPZ)",def:"Zone where goods are manufactured for export with reduced tariffs and regulations."},
  {u:7,term:"Outsourcing",def:"Hiring external (often foreign) workers or firms to perform tasks, usually to cut costs."},
  {u:7,term:"Deindustrialization",def:"Reduction of industrial activity in a region or country, often as manufacturing moves to lower-wage countries."},
  {u:7,term:"Weber's least-cost theory",def:"Industries locate where production costs (labor, transport, agglomeration) are minimized."},
  {u:7,term:"Agglomeration",def:"The clustering of related businesses/industries in one area for shared resources and infrastructure."},
  {u:7,term:"Fordism",def:"Mass production using assembly lines — standardized products, unskilled labor (e.g., Ford factories)."},
  {u:7,term:"Post-Fordism",def:"Flexible production, just-in-time manufacturing, and specialized skilled labor — replaced Fordism."},
  {u:7,term:"Gender inequality index (GII)",def:"Measures gender-based disadvantage in reproductive health, empowerment, and labor market participation."},
  {u:7,term:"Microfinance",def:"Small loans given to poor individuals (often women) in LDCs to start small businesses."},
  {u:7,term:"Fair trade",def:"A movement ensuring producers in LDCs receive fair wages and ethical treatment from buyers in MDCs."},
  {u:7,term:"Dependency theory",def:"LDCs are kept underdeveloped by their economic dependence on MDCs — critiques Rostow's optimism."},
];

let currentUnit = 'all';
let fcCards = [], fcIndex = 0, fcFlipped = false, fcCorrect = 0, fcTotal = 0;
let quizCards = [], quizIndex = 0, qCorrect = 0, qTotal = 0, qAnswered = false;

// ══════════════ UTILS ══════════════
function shuffle(arr) {
  let a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function getFiltered(arr) {
  return currentUnit === 'all' ? arr : arr.filter(x => x.u === currentUnit);
}

// ══════════════ TABS ══════════════
function switchTab(tab, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('sec-' + tab).classList.add('active');
  btn.classList.add('active');
  document.getElementById('unit-filter').style.display = tab === 'summaries' ? 'none' : 'flex';
}

// ══════════════ UNIT FILTER ══════════════
function setUnit(u, btn) {
  currentUnit = u;
  document.querySelectorAll('.unit-pill').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  initFlashcards(); initQuiz(); initFRQ();
}

// ══════════════ FLASHCARDS ══════════════
function initFlashcards() {
  fcCards = shuffle(getFiltered(ALL_CARDS));
  fcIndex = 0; fcFlipped = false; fcCorrect = 0; fcTotal = 0;
  renderCard();
}
function renderCard() {
  if (!fcCards.length) {
    document.getElementById('fc-term').textContent = 'No cards for this filter.';
    document.getElementById('fc-label').textContent = '';
    document.getElementById('fc-hint').textContent = '';
    document.getElementById('fc-unit-tag').textContent = '';
    document.getElementById('fc-counter').textContent = '—';
    document.getElementById('fc-bar').style.width = '0%';
    return;
  }
  const c = fcCards[fcIndex % fcCards.length];
  document.getElementById('fc-label').textContent = fcFlipped ? 'Definition' : 'Term';
  document.getElementById('fc-term').textContent = fcFlipped ? c.def : c.term;
  document.getElementById('fc-hint').textContent = fcFlipped ? 'tap to flip back' : 'tap to flip';
  document.getElementById('fc-unit-tag').textContent = 'Unit ' + c.u;
  const idx = fcIndex % fcCards.length;
  document.getElementById('fc-counter').textContent = (idx + 1) + ' / ' + fcCards.length;
  document.getElementById('fc-bar').style.width = Math.round(((idx + 1) / fcCards.length) * 100) + '%';
  document.getElementById('fc-stats').textContent = fcTotal > 0 ? 'Session: ' + fcCorrect + ' / ' + fcTotal + ' correct' : '';
}
function flipCard() { fcFlipped = !fcFlipped; renderCard(); }
function markCard(correct) {
  fcTotal++;
  if (correct) fcCorrect++;
  fcFlipped = false;
  fcIndex++;
  renderCard();
}

// ══════════════ QUIZ ══════════════
function initQuiz() {
  quizCards = shuffle(getFiltered(ALL_CARDS));
  quizIndex = 0; qCorrect = 0; qTotal = 0;
  renderQuiz();
}
function renderQuiz() {
  if (!quizCards.length) {
    document.getElementById('quiz-q').textContent = 'No questions for this filter.';
    document.getElementById('quiz-opts').innerHTML = '';
    return;
  }
  const correct = quizCards[quizIndex % quizCards.length];
  const pool = getFiltered(ALL_CARDS).filter(c => c.term !== correct.term);
  const opts = shuffle([correct, ...shuffle(pool).slice(0, 3)]);
  qAnswered = false;
  document.getElementById('quiz-score').textContent = qTotal > 0 ? 'Score: ' + qCorrect + ' / ' + qTotal : 'Answer to start';
  document.getElementById('quiz-unit-tag').textContent = 'Unit ' + correct.u;
  document.getElementById('quiz-q').textContent = 'What is "' + correct.term + '"?';
  document.getElementById('quiz-feedback').innerHTML = '';
  document.getElementById('quiz-next').style.display = 'none';
  const container = document.getElementById('quiz-opts');
  container.innerHTML = '';
  opts.forEach(o => {
    const btn = document.createElement('button');
    btn.className = 'quiz-opt';
    btn.textContent = o.def;
    btn.dataset.correct = o.term === correct.term ? '1' : '0';
    btn.dataset.correctDef = correct.def;
    btn.addEventListener('click', () => answerQuiz(btn));
    container.appendChild(btn);
  });
}
function answerQuiz(btn) {
  if (qAnswered) return;
  qAnswered = true; qTotal++;
  const isCorrect = btn.dataset.correct === '1';
  const correctDef = btn.dataset.correctDef;
  if (isCorrect) {
    qCorrect++;
    btn.classList.add('correct');
    document.getElementById('quiz-feedback').innerHTML = '<div class="quiz-feedback correct">Correct!</div>';
  } else {
    btn.classList.add('wrong');
    document.getElementById('quiz-feedback').innerHTML = '<div class="quiz-feedback wrong">Not quite — correct answer highlighted in green.</div>';
    document.querySelectorAll('.quiz-opt').forEach(b => { if (b.textContent === correctDef) b.classList.add('correct'); });
  }
  document.querySelectorAll('.quiz-opt').forEach(b => b.disabled = true);
  document.getElementById('quiz-next').style.display = 'inline-block';
  document.getElementById('quiz-score').textContent = 'Score: ' + qCorrect + ' / ' + qTotal;
}
function nextQuiz() { quizIndex++; renderQuiz(); }

// ══════════════ FRQ ══════════════
function initFRQ() {
  frqList = shuffle(getFiltered(FRQS).length ? getFiltered(FRQS) : FRQS);
  frqIndex = 0; renderFRQ();
}
function renderFRQ() {
  if (!frqList.length) {
    document.getElementById('frq-prompt').textContent = 'No FRQs for this filter. Try All units.';
    document.getElementById('frq-rubric').innerHTML = '';
    return;
  }
  const f = frqList[frqIndex % frqList.length];
  document.getElementById('frq-num').textContent = 'FRQ ' + (frqIndex % frqList.length + 1) + ' of ' + frqList.length + ' · Unit ' + f.u;
  document.getElementById('frq-prompt').textContent = f.prompt;
  document.getElementById('frq-rubric').innerHTML = f.rubric;
  document.getElementById('frq-answer').value = '';
  const det = document.querySelector('details.rubric');
  if (det) det.removeAttribute('open');
}
function nextFRQ() { frqIndex++; renderFRQ(); }
function skipFRQ() { frqIndex++; renderFRQ(); }

// ══════════════ SUMMARIES ══════════════
function initSummaries() {
  document.getElementById('summary-grid').innerHTML = SUMMARIES.map(s =>
    `<div class="summary-card" onclick="showSummary(${s.u})">
      <div class="s-unit-num">UNIT ${s.u}</div>
      <div class="s-unit-name">${s.name}</div>
    </div>`
  ).join('');
}
function showSummary(u) {
  const s = SUMMARIES.find(x => x.u === u);
  document.getElementById('summary-detail-card').innerHTML =
    `<h2>Unit ${s.u} — ${s.name}</h2><ul>${s.points.map(p => `<li>${p}</li>`).join('')}</ul>`;
  document.getElementById('summary-list').style.display = 'none';
  document.getElementById('summary-detail').style.display = 'block';
}
function showSummaryList() {
  document.getElementById('summary-list').style.display = 'block';
  document.getElementById('summary-detail').style.display = 'none';
}

// ══════════════ INIT ══════════════
initFlashcards();
initQuiz();
initFRQ();
initSummaries();
</script>
</body>
</html>
